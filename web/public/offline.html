<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline | Prizetown</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080d24;
      --card: rgba(9, 15, 38, 0.86);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.74);
      --gold: #f7b733;
      --purple: #8b5cf6;
      --border: rgba(255, 255, 255, 0.14);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top right, rgba(139, 92, 246, 0.28), transparent 34%), linear-gradient(135deg, #050816, var(--bg));
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .wrap {
      width: min(1120px, 100%);
      display: grid;
      grid-template-columns: minmax(280px, 0.92fr) minmax(320px, 1.18fr);
      gap: 24px;
      align-items: center;
    }
    .copy {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: clamp(24px, 4vw, 42px);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(12px);
    }
    .eyebrow {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      margin: 0 0 14px;
      color: var(--gold);
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.82rem;
    }
    h1 {
      margin: 0;
      font-size: clamp(2.3rem, 7vw, 5.7rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
    }
    p {
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.65;
      margin: 18px 0 0;
    }
    .status {
      margin-top: 22px;
      display: inline-flex;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.06);
      font-size: 0.9rem;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 26px;
    }
    a {
      color: inherit;
      text-decoration: none;
      border-radius: 999px;
      padding: 12px 16px;
      font-weight: 850;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.08);
    }
    a.primary {
      background: linear-gradient(135deg, var(--gold), #ff7a18);
      color: #171006;
      border-color: transparent;
    }
    .art {
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 24px 90px rgba(0, 0, 0, 0.48);
      background: rgba(255, 255, 255, 0.05);
    }
    .art img {
      display: block;
      width: 100%;
      height: auto;
    }
    @media (max-width: 860px) {
      body { padding: 16px; }
      .wrap { grid-template-columns: 1fr; }
      .copy { order: 2; }
      .art { order: 1; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="copy">
      <div class="eyebrow">⚡ Offline</div>
      <h1>Arnold is reconnecting Prizetown</h1>
      <p>The connection is taking a breather. Arnold is checking the rack and we should be back once things settle.</p>
      <div class="status">Temporarily offline</div>
      <div class="actions">
        <a class="primary" href="/">Go home</a>
        <a href="/#competitions">View competitions</a>
      </div>
    </section>
    <section class="art" aria-label="Arnold fixing server wires">
      <img src="/arnold-server-repair-404.png" alt="Arnold fixing tangled server wires in a server rack" />
    </section>
  </main>
</body>
</html>
