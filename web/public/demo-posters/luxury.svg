    <filter id="shadow"><feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000" flood-opacity=".5"/></filter>
  </defs>
  <rect width="900" height="1200" rx="54" fill="url(#bg)"/>
  <circle cx="450" cy="390" r="330" fill="url(#glow)"/>
