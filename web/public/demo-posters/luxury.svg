  <text x="450" y="735" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="105" font-weight="900" fill="#fff">LUXURY</text>
  <text x="450" y="835" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="74" font-weight="900" fill="#facc15">NIGHT AWAY</text>
